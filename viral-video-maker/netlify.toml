# Netlify Configuration for Viral Video Maker SaaS

[build]
  command = "npm run build && npm run build:client"
  publish = "client/build"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-image-optim"

[[plugins]]
  package = "netlify-plugin-cache-next"

[dev]
  command = "npm run dev"
  port = 3000
  publish = "client/build"

[context.production]
  # Environment variables for production
  [context.production.environment]
    NODE_ENV = "production"
    MONGODB_URI = "mongodb://localhost:27017/viral-video-maker-prod"
    STRIPE_SECRET_KEY = "sk_live_..."
    OPENAI_API_KEY = "sk-..."
    JWT_SECRET = "your-production-secret"

[context.staging]
  # Environment variables for staging
  [context.staging.environment]
    NODE_ENV = "staging"
    MONGODB_URI = "mongodb://localhost:27017/viral-video-maker-staging"
    STRIPE_SECRET_KEY = "sk_test_..."
    OPENAI_API_KEY = "sk-..."
    JWT_SECRET = "your-staging-secret"

# Redirect rules
[[redirects]]
  from = "/api/*"
  to = "https://your-api-server.netlify.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/dashboard"
  to = "/app/dashboard"
  status = 301

[[redirects]]
  from = "/login"
  to = "/app/login"
  status = 301

[[redirects]]
  from = "/signup"
  to = "/app/signup"
  status = 301

[[redirects]]
  from = "/*"
  to = "/app/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.json"
  [headers.values]
    Cache-Control = "no-cache"

# Analytics
[build]
  analytics = "your-google-analytics-id"

# Feature flags
[build]
  [build.features]
    "polyfill-io" = true